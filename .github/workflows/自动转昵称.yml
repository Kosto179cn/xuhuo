name: 🔗 Gitee同步 - 抖音ID转昵称

on:
  schedule:
    # 北京时间 每10分钟执行一次
    - cron: '* * 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'sync'
        type: choice
        options:
          - sync
          - debug
  push:
    branches:
      - main
      - master
    paths:
      - 'sync_users.js'
      - '.github/workflows/自动转昵称.yml'

# 仓库写入权限，解决git push失败问题
permissions:
  contents: write

jobs:
  sync-users:
    runs-on: ubuntu-latest
    name: 同步Gitee抖音号
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # 已删除cache: npm，彻底解决锁文件报错

      - name: ⚙️ 安装依赖
        run: |
          npm install axios playwright
          # 安装Chromium及系统依赖，解决浏览器启动失败
          npx playwright install chromium --with-deps

      - name: 🔍 执行同步脚本
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          DOUYIN_COOKIES: ${{ secrets.DOUYIN_COOKIES }}
          DEBUG: ${{ inputs.mode == 'debug' && '*' || '' }}
        run: |
          node sync_users.js
        shell: bash

      - name: 📤 推送更新 (如果users.txt有变化)
        id: git_commit
        if: always()
        run: |
          if git diff --exit-code users.txt > /dev/null; then
            echo "✅ users.txt 无变化，无需提交"
            echo "NO_CHANGES=false" >> $GITHUB_ENV
          else
            echo "🔄 users.txt 有变化，正在提交更新"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add users.txt
            git commit -m "🤖 自动更新 users.txt $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "NO_CHANGES=true" >> $GITHUB_ENV
          fi
        shell: bash

      - name: 📝 同步成功通知
        if: env.NO_CHANGES == 'true'
        run: |
          echo "✅ 已成功同步Gitee抖音号，更新users.txt文件"
        shell: bash

      - name: ❌ 执行失败通知
        if: failure()
        run: |
          echo "❌ 同步脚本执行失败，请检查日志排查问题"
        shell: bash
