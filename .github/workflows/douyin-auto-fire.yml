name: 抖音续火花自动任务

on:
  push:
    paths:
      - 'index.js'
      - 'sync_users.js' # 建议加上：修改同步脚本时也能触发
  schedule:
    - cron: '0 16 * * *' 
  workflow_dispatch:

jobs:
  auto-fire:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 安装依赖
        run: npm install axios playwright
      
      - name: 安装 Playwright 浏览器
        run: npx playwright install chromium
      
      # ⭐ 新增步骤：先运行同步用户脚本 (注意这里的空格对齐)
      - name: 运行同步用户脚本
        env:
          DOUYIN_COOKIES: ${{ secrets.DOUYIN_COOKIES }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: node sync_users.js
      
      # ⭐ 原有步骤：后运行自动发送(续火)脚本
      - name: 运行自动发送脚本
        env:
          DOUYIN_COOKIES: ${{ secrets.DOUYIN_COOKIES }}
          TARGET_USERS: ${{ secrets.TARGET_USERS }}
          # 核心逻辑：如果是 push 触发，设置单人模式变量
          ONLY_FOR_KOSTO: ${{ github.event_name == 'push' && 'Kosto' || '' }}
        run: node index.js
      
      - name: 上传错误截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3